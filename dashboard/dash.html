<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Moderno</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dash.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <a class="back-portfolio" href="../index.html" aria-label="Voltar ao Portfolio">←</a>
                <div>
                    <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
                </div>
            </div>
            <div class="header-info">
                <div class="date-time">
                    <p id="datetime"></p>
                </div>
                <div class="user-menu">
                    <a class="user-button" href="../usuario.html">
                        <span id="dashboardAvatar" class="avatar">JG</span>
                        <span id="dashboardUserName" class="user-name">João Gabriel</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-icon"><i class="fas fa-dollar-sign"></i></div>
                <div id="card-receita-titulo" class="card-title">Receita Total</div>
                <div id="card-receita-valor" class="card-value">R$ 0,00</div>
                <div id="card-receita-growth" class="card-growth"></div>
            </div>

            <div class="card">
                <div class="card-icon"><i class="fas fa-chart-line"></i></div>
                <div class="card-title">Lucro</div>
                <div id="card-lucro-valor" class="card-value">R$ 0,00</div>
                <div id="card-lucro-growth" class="card-growth"></div>
            </div>

            <div class="card">
                <div class="card-icon"><i class="fas fa-boxes"></i></div>
                <div class="card-title">CAMISETAS RESTANTES</div>
                <div id="card-estoque-restante-valor" class="card-value">0</div>
                <div id="card-estoque-growth" class="card-growth"></div>
            </div>

            <div class="card">
                <div class="card-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="card-title">Vendas</div>
                <div id="card-vendas-valor" class="card-value">0</div>
                <div id="card-vendas-growth" class="card-growth"></div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <!-- Bar Chart -->
            <div class="chart-container">
                <h3 id="chartTitle" class="chart-title">Vendas por Estoque</h3>
                <div class="bar-chart">
                    <div id="barra-amarela" class="bar">
                        <span class="bar-value">0</span>
                        <span class="bar-label">AMARELA</span>
                    </div>
                    <div id="barra-azul" class="bar">
                        <span class="bar-value">0</span>
                        <span class="bar-label">AZUL</span>
                    </div>
                    <div id="barra-amar-fem" class="bar">
                        <span class="bar-value">0</span>
                        <span class="bar-label">AMAR.FEM</span>
                    </div>
                    <div id="barra-azul-fem" class="bar">
                        <span class="bar-value">0</span>
                        <span class="bar-label">AZUL.FEM</span>
                    </div>
                </div>
            </div>

            <!-- Progress Chart -->
            <div class="chart-container">
                <h3 class="chart-title">Progresso de Metas</h3>

                <div id="progresso-amarela" class="progress-item">
                    <div class="progress-label">
                        <span class="progress-name">AMARELA</span>
                        <span class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="progresso-azul" class="progress-item">
                    <div class="progress-label">
                        <span class="progress-name">AZUL</span>
                        <span class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="progresso-amar-fem" class="progress-item">
                    <div class="progress-label">
                        <span class="progress-name">AMAR.FEM</span>
                        <span class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="progresso-azul-fem" class="progress-item">
                    <div class="progress-label">
                        <span class="progress-name">AZUL.FEM</span>
                        <span class="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Activity Table -->
        <div class="table-container">
            <h3 class="chart-title">Atividade Recente</h3>
            <table>
                <thead>
                    <tr>
                        <th>Pedido</th>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recentActivityBody"></tbody>
            </table>
        </div>

    </div>

                    <script>
function updateDateTime() {
    const now = new Date();
    const options = {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    };
    const datetime = document.getElementById("datetime");
    if (datetime) {
        datetime.textContent = now.toLocaleDateString("pt-BR", options);
    }
}

function applySavedMode() {
    const saved = localStorage.getItem("darkMode");
    if (saved === "on") {
        document.body.classList.add("dark-mode");
    } else {
        document.body.classList.remove("dark-mode");
    }
}

function formatInitials(fullName) {
    const parts = fullName.trim().split(/\s+/).filter(Boolean);
    if (parts.length === 0) return "??";
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function applyStoredProfile() {
    const name = localStorage.getItem("profileName") || "João Gabriel";
    const avatar = document.getElementById("dashboardAvatar");
    const nameEl = document.getElementById("dashboardUserName");
    if (avatar) avatar.textContent = formatInitials(name);
    if (nameEl) nameEl.textContent = name.length > 30 ? name.slice(0, 30) + "…" : name;
}

window.onload = async function carregarDadosDashboard() {
    updateDateTime();
    applySavedMode();
    applyStoredProfile();

    try {
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzFzlSDwUT0Q9s-rnZiRWW0VIz5W09lz6qm_vE_nCIybGKQ9UTXbkA_F9deydKymZ4_5dzcCixJPI/pub?output=csv';
        const resposta = await fetch(url);
        const textoCSV = await resposta.text();
        
        // Quebra as linhas limpando retornos de carro
        const linhas = textoCSV.split(/\r?\n/);
        
        const estoque = {
            'AMARELA': { total: 0, vendido: 0 },
            'AZUL': { total: 0, vendido: 0 },
            'AMAR.FEM': { total: 0, vendido: 0 },
            'AZUL.FEM': { total: 0, vendido: 0 }
        };
        
        let blocoAtual = null;
        const tabelaClientesBody = document.getElementById('recentActivityBody');
        if (tabelaClientesBody) tabelaClientesBody.innerHTML = '';

        for (let i = 0; i < linhas.length; i++) {
            let linha = linhas[i].trim();
            if (!linha) continue;

            // Divide por vírgula considerando possíveis aspas do Sheets
            let colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            // Limpa as aspas de todas as células de forma robusta
            let dados = colunas.map(c => c.replace(/^"|"$/g, '').trim());

            // 1. FINANCEIRO (Busca dinâmica por texto em qualquer coluna)
            dados.forEach((celula, idx) => {
                if (celula.includes("Total Recebido") && dados[idx + 1]) {
                    faturamento = parseFloat(dados[idx + 1].replace(/\./g, '').replace(',', '.')) || 0;
                }
                if (celula.includes("Lucro") && dados[idx + 1]) {
                    lucro = parseFloat(dados[idx + 1].replace(/\./g, '').replace(',', '.')) || 0;
                }
            });

            // 2. ESTOQUE (Busca nas colunas centrais)
            for (let j = 0; j < dados.length; j++) {
                let valorCaixaalta = dados[j].toUpperCase();
                if (['AMARELA', 'AZUL', 'AMAR.FEM', 'AZUL.FEM'].includes(valorCaixaalta)) {
                    blocoAtual = valorCaixaalta;
                }
            }

            if (blocoAtual && ['P', 'M', 'G', 'GG'].includes(dados[4])) {
                let qtdTotal = parseInt(dados[5]) || 0;
                let qtdVendida = parseInt(dados[6]) || 0;
                
                estoque[blocoAtual].total += qtdTotal;
                estoque[blocoAtual].vendido += qtdVendida;
                totalVendas += qtdVendida;
            }

            // 3. CLIENTES ATIVIDADE RECENTE
            if (dados[11] && i > 1 && !dados[11].includes("Cliente") && !dados[11].includes("Total") && !dados[11].includes("Lucro")) {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dados[11]}</td>
                    <td>${dados[12] || '—'}</td>
                    <td>${dados[13] || '—'}</td>
                    <td>${dados[14] || '—'}</td>
                    <td>${dados[15] || '—'}</td>
                    <td>${dados[16] ? 'R$ ' + dados[16] : '—'}</td>
                `;
                if (tabelaClientesBody) tabelaClientesBody.appendChild(tr);
            }
        }

        // CÁLCULO DE ITENS RESTANTES
        let totalRestante = 0;
        Object.keys(estoque).forEach(key => {
            totalRestante += (estoque[key].total - estoque[key].vendido);
        });

        // INJEÇÃO DOS VALORES FORMATADOS NOS CARDS
        const receitaEl = document.getElementById('card-receita-valor');
        if (receitaEl) {
            receitaEl.textContent = `R$ ${faturamento.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
        }
        
        const cardLucro = document.getElementById('card-lucro-valor');
        if (cardLucro) {
            cardLucro.textContent = `R$ ${lucro.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            cardLucro.style.color = lucro < 0 ? '#ef4444' : '#10b981';
        }

        const estoqueRestanteEl = document.getElementById('card-estoque-restante-valor');
        if (estoqueRestanteEl) {
            estoqueRestanteEl.textContent = totalRestante;
        }

        const vendasEl = document.getElementById('card-vendas-valor');
        if (vendasEl) {
            vendasEl.textContent = totalVendas;
        }

        // ATUALIZAÇÃO DO GRÁFICO VERTICAL
        const atualizarBar = (id, valor) => {
            const elemento = document.getElementById(id);
            if (elemento) {
                elemento.style.height = `${valor * 30}px`;
                elemento.textContent = valor;
            }
        };

        atualizarBar('barra-amarela', estoque['AMARELA'].vendido);
        atualizarBar('barra-azul', estoque['AZUL'].vendido);
        atualizarBar('barra-amar-fem', estoque['AMAR.FEM'].vendido);
        atualizarBar('barra-azul-fem', estoque['AZUL.FEM'].vendido);

        // ATUALIZAÇÃO DAS METAS HORIZONTAIS
        const aplicarMeta = (id, vend, tot) => {
            const pct = tot > 0 ? Math.round((vend / tot) * 100) : 0;
            const el = document.getElementById(id);
            if (el) {
                el.style.width = `${pct}%`;
                const label = el.parentElement.parentElement.querySelector('.progress-percentage');
                if (label) label.textContent = `${pct}%`;
            }
        };

        aplicarMeta('progresso-amarela', estoque['AMARELA'].vendido, estoque['AMARELA'].total);
        aplicarMeta('progresso-azul', estoque['AZUL'].vendido, estoque['AZUL'].total);
        aplicarMeta('progresso-amar-fem', estoque['AMAR.FEM'].vendido, estoque['AMAR.FEM'].total);
        aplicarMeta('progresso-azul-fem', estoque['AZUL.FEM'].vendido, estoque['AZUL.FEM'].total);

    } catch (e) {
        console.error('Erro na atualização do painel:', e);
    }
};
</script>
</body>
</html>
